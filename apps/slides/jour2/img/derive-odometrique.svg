<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <marker id="ar-real" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5bc07a"/>
    </marker>
    <marker id="ar-odom" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff7a1a"/>
    </marker>
    <marker id="ar-gap" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ba7b4"/>
    </marker>
  </defs>

  <!-- départ -->
  <circle cx="70" cy="190" r="34" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="70" y="195" fill="#e6edf3" font-size="15" text-anchor="middle">départ</text>

  <!-- trajet réel -->
  <path d="M100 172 Q 270 70 430 95" fill="none" stroke="#5bc07a" stroke-width="3.5" marker-end="url(#ar-real)"/>
  <rect x="392" y="78" width="150" height="44" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="467" y="106" fill="#e6edf3" font-size="14" text-anchor="middle">arrivée réelle</text>

  <!-- trajet odométrie -->
  <path d="M100 210 Q 270 320 430 295" fill="none" stroke="#ff7a1a" stroke-width="3.5" stroke-dasharray="9 7" marker-end="url(#ar-odom)"/>
  <rect x="392" y="278" width="150" height="58" rx="8" fill="#212833" stroke="#ff7a1a" stroke-width="2"/>
  <text x="467" y="302" fill="#e6edf3" font-size="14" text-anchor="middle">arrivée</text>
  <text x="467" y="322" fill="#9ba7b4" font-size="13" text-anchor="middle">odométrie</text>

  <!-- écart qui grandit -->
  <line x1="467" y1="126" x2="467" y2="272" stroke="#9ba7b4" stroke-width="1.5" stroke-dasharray="4 5" marker-start="url(#ar-gap)" marker-end="url(#ar-gap)"/>
  <rect x="498" y="178" width="58" height="42" rx="6" fill="#161b22"/>
  <text x="527" y="195" fill="#9ba7b4" font-size="12" text-anchor="middle">écart</text>
  <text x="527" y="211" fill="#9ba7b4" font-size="12" text-anchor="middle">↑</text>
</svg>
