<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <marker id="rc-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ba7b4"/>
    </marker>
    <marker id="rc-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5bc07a"/>
    </marker>
  </defs>

  <!-- échec -->
  <rect x="20" y="125" width="150" height="50" rx="8" fill="#212833" stroke="#e45858" stroke-width="2.5"/>
  <text x="95" y="155" fill="#e6edf3" font-size="14" text-anchor="middle">échec / bloqué</text>

  <!-- recovery -->
  <rect x="225" y="125" width="140" height="50" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="295" y="155" fill="#ff7a1a" font-size="15" text-anchor="middle">recovery</text>

  <line x1="170" y1="150" x2="219" y2="150" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>

  <!-- comportements -->
  <rect x="430" y="20" width="150" height="46" rx="8" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="505" y="48" fill="#e6edf3" font-size="14" text-anchor="middle">spin</text>
  <rect x="430" y="127" width="150" height="46" rx="8" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="505" y="148" fill="#e6edf3" font-size="13" text-anchor="middle">drive_on_heading</text>
  <text x="505" y="164" fill="#9ba7b4" font-size="11" text-anchor="middle">(holonome)</text>
  <rect x="430" y="234" width="150" height="46" rx="8" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="505" y="262" fill="#e6edf3" font-size="14" text-anchor="middle">wait</text>

  <path d="M365 145 Q 400 60 426 48" fill="none" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>
  <line x1="365" y1="150" x2="426" y2="150" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>
  <path d="M365 155 Q 400 240 426 252" fill="none" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>

  <!-- clear costmap -->
  <rect x="645" y="127" width="150" height="46" rx="8" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="720" y="155" fill="#e6edf3" font-size="13" text-anchor="middle">clear_costmap</text>

  <path d="M580 43 Q 620 100 660 124" fill="none" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>
  <line x1="580" y1="150" x2="639" y2="150" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>
  <path d="M580 257 Q 620 200 660 176" fill="none" stroke="#9ba7b4" stroke-width="2.5" marker-end="url(#rc-ar)"/>

  <!-- réessai -->
  <rect x="845" y="127" width="120" height="46" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="905" y="155" fill="#e6edf3" font-size="14" text-anchor="middle">réessai</text>
  <line x1="795" y1="150" x2="839" y2="150" stroke="#5bc07a" stroke-width="2.5" marker-end="url(#rc-ok)"/>
</svg>
