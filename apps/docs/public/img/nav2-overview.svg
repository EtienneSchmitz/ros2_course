<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" role="img" aria-labelledby="nav2-title nav2-desc" font-family="'JetBrains Mono', ui-monospace, monospace">
  <title id="nav2-title">Vue d'ensemble de la pile Nav2</title>
  <desc id="nav2-desc">Un goal pose (posé dans RViz ou envoyé par code) entre dans le Planner (Smac, NavFn) qui calcule un plan global, transmis au Controller (MPPI). Le Controller publie /cmd_vel_nav, arbitré par twist_mux qui produit /cmd_vel. Le Planner s'appuie sur le global costmap (carte + obstacles) et le Controller sur le local costmap (LiDAR temps réel). Les deux costmaps sont alimentés par /map, /scan et la tf base_footprint.</desc>

  <defs>
    <marker id="nav2-cmd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff7a1a"/>
    </marker>
    <marker id="nav2-data" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#40a8c4"/>
    </marker>
  </defs>

  <!-- goal pose -->
  <rect x="20" y="24" width="180" height="48" rx="8" fill="#212833" stroke="#ff7a1a" stroke-width="2"/>
  <text x="110" y="46" fill="#e6edf3" font-size="14" text-anchor="middle">goal pose</text>
  <text x="110" y="63" fill="#9ba7b4" font-size="11" text-anchor="middle">RViz ou code</text>
  <line x1="110" y1="72" x2="110" y2="136" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#nav2-cmd)"/>

  <!-- Planner (nœud clé) -->
  <rect x="20" y="140" width="180" height="72" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="110" y="172" fill="#ff7a1a" font-size="14" text-anchor="middle">Planner</text>
  <text x="110" y="192" fill="#9ba7b4" font-size="11" text-anchor="middle">Smac, NavFn…</text>

  <!-- Planner -> Controller (plan global) -->
  <line x1="200" y1="176" x2="296" y2="176" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#nav2-cmd)"/>
  <text x="248" y="167" fill="#9ba7b4" font-size="11" text-anchor="middle">plan global</text>

  <!-- Controller (nœud clé) -->
  <rect x="300" y="140" width="180" height="72" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="390" y="172" fill="#ff7a1a" font-size="14" text-anchor="middle">Controller</text>
  <text x="390" y="192" fill="#9ba7b4" font-size="11" text-anchor="middle">MPPI</text>

  <!-- Controller -> /cmd_vel_nav -> twist_mux -> /cmd_vel -->
  <line x1="480" y1="176" x2="516" y2="176" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#nav2-cmd)"/>
  <rect x="520" y="153" width="150" height="46" rx="8" fill="#212833" stroke="#ff7a1a" stroke-width="2"/>
  <text x="595" y="181" fill="#e6edf3" font-size="13" text-anchor="middle">/cmd_vel_nav</text>

  <line x1="670" y1="176" x2="696" y2="176" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#nav2-cmd)"/>
  <rect x="700" y="153" width="110" height="46" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="755" y="181" fill="#e6edf3" font-size="13" text-anchor="middle">twist_mux</text>

  <line x1="810" y1="176" x2="836" y2="176" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#nav2-cmd)"/>
  <rect x="840" y="153" width="120" height="46" rx="8" fill="#212833" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="900" y="181" fill="#e6edf3" font-size="13" text-anchor="middle">/cmd_vel</text>

  <!-- costmaps -->
  <rect x="20" y="260" width="180" height="64" rx="8" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="110" y="288" fill="#e6edf3" font-size="13" text-anchor="middle">Global costmap</text>
  <text x="110" y="306" fill="#9ba7b4" font-size="11" text-anchor="middle">carte + obstacles</text>
  <line x1="110" y1="260" x2="110" y2="216" stroke="#40a8c4" stroke-width="2.5" marker-end="url(#nav2-data)"/>

  <rect x="300" y="260" width="180" height="64" rx="8" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="390" y="288" fill="#e6edf3" font-size="13" text-anchor="middle">Local costmap</text>
  <text x="390" y="306" fill="#9ba7b4" font-size="11" text-anchor="middle">LiDAR temps réel</text>
  <line x1="390" y1="260" x2="390" y2="216" stroke="#40a8c4" stroke-width="2.5" marker-end="url(#nav2-data)"/>

  <!-- alimentation des costmaps -->
  <rect x="120" y="368" width="290" height="46" rx="8" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="265" y="396" fill="#e6edf3" font-size="13" text-anchor="middle">/map · /scan · tf (base_footprint)</text>
  <path d="M265 368 L265 348 L110 348 L110 328" fill="none" stroke="#40a8c4" stroke-width="2.5" marker-end="url(#nav2-data)"/>
  <path d="M265 348 L390 348 L390 328" fill="none" stroke="#40a8c4" stroke-width="2.5" marker-end="url(#nav2-data)"/>
</svg>
