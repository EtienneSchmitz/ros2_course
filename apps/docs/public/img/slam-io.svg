<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="1000" height="240" role="img" aria-labelledby="slamio-title slamio-desc" font-family="'JetBrains Mono', ui-monospace, monospace">
  <title id="slamio-title">Entrées et sorties de slam_toolbox</title>
  <desc id="slamio-desc">Le nœud slam_toolbox prend en entrée les scans laser /scan (sensor_msgs/LaserScan) et la transformation /tf odom vers base_footprint, et produit en sortie la carte /map (nav_msgs/OccupancyGrid), la transformation /tf map vers odom qui corrige la dérive de l'odométrie, et /map_metadata.</desc>

  <defs>
    <marker id="slamio-in" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#40a8c4"/>
    </marker>
    <marker id="slamio-out" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5bc07a"/>
    </marker>
  </defs>

  <!-- entrées -->
  <rect x="20" y="48" width="250" height="46" rx="8" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="145" y="76" fill="#e6edf3" font-size="14" text-anchor="middle">/scan (LaserScan)</text>

  <rect x="20" y="146" width="250" height="46" rx="8" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="145" y="168" fill="#e6edf3" font-size="13" text-anchor="middle">/tf</text>
  <text x="145" y="184" fill="#9ba7b4" font-size="11" text-anchor="middle">odom → base_footprint</text>

  <!-- jonction entrées -> slam_toolbox -->
  <path d="M270 71 L 306 71 L 306 120" fill="none" stroke="#40a8c4" stroke-width="2.5"/>
  <path d="M270 169 L 306 169 L 306 120" fill="none" stroke="#40a8c4" stroke-width="2.5"/>
  <line x1="306" y1="120" x2="346" y2="120" stroke="#40a8c4" stroke-width="2.5" marker-end="url(#slamio-in)"/>

  <!-- slam_toolbox (nœud central) -->
  <rect x="350" y="90" width="180" height="60" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="440" y="125" fill="#ff7a1a" font-size="15" text-anchor="middle">slam_toolbox</text>

  <!-- sorties -->
  <rect x="700" y="20" width="280" height="44" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="840" y="47" fill="#e6edf3" font-size="13" text-anchor="middle">/map (OccupancyGrid)</text>

  <rect x="700" y="98" width="280" height="44" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2.5"/>
  <text x="840" y="119" fill="#e6edf3" font-size="13" text-anchor="middle">/tf</text>
  <text x="840" y="134" fill="#5bc07a" font-size="11" text-anchor="middle">map → odom (corrige la dérive)</text>

  <rect x="700" y="176" width="280" height="44" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="840" y="203" fill="#e6edf3" font-size="13" text-anchor="middle">/map_metadata</text>

  <!-- slam_toolbox -> sorties -->
  <path d="M530 110 L 668 110 L 668 42 L 696 42" fill="none" stroke="#5bc07a" stroke-width="2.5" marker-end="url(#slamio-out)"/>
  <line x1="530" y1="120" x2="696" y2="120" stroke="#5bc07a" stroke-width="2.5" marker-end="url(#slamio-out)"/>
  <path d="M530 130 L 668 130 L 668 198 L 696 198" fill="none" stroke="#5bc07a" stroke-width="2.5" marker-end="url(#slamio-out)"/>
</svg>
