<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600" role="img" aria-labelledby="rc-title rc-desc" font-family="'JetBrains Mono', ui-monospace, monospace">
  <title id="rc-title">Architecture ros2_control de la base LeKiwi</title>
  <desc id="rc-desc">La consigne /cmd_vel entre dans le controller_manager, qui charge deux contrôleurs : omni_wheel_drive_controller (cinématique inverse, publie /odom) et joint_state_broadcaster (publie /joint_states). Le manager écrit les consignes via les command_interfaces vers le hardware interface (gz_ros2_control en simulation, driver moteurs sur le robot réel) et lit l'état via les state_interfaces. Le hardware interface pilote le robot (Gazebo en simulation, les trois roues réelles).</desc>

  <defs>
    <marker id="rc-cmd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff7a1a"/>
    </marker>
    <marker id="rc-state" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#40a8c4"/>
    </marker>
    <marker id="rc-out" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5bc07a"/>
    </marker>
    <marker id="rc-hw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ba7b4"/>
    </marker>
  </defs>

  <!-- entrée /cmd_vel -->
  <rect x="20" y="180" width="150" height="46" rx="8" fill="#212833" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="95" y="202" fill="#e6edf3" font-size="14" text-anchor="middle">/cmd_vel</text>
  <text x="95" y="218" fill="#9ba7b4" font-size="10" text-anchor="middle">de twist_mux</text>
  <line x1="170" y1="203" x2="220" y2="210" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#rc-cmd)"/>

  <!-- sorties (haut) -->
  <rect x="280" y="34" width="170" height="46" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="365" y="62" fill="#e6edf3" font-size="14" text-anchor="middle">/odom</text>
  <rect x="560" y="34" width="190" height="46" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="655" y="62" fill="#e6edf3" font-size="13" text-anchor="middle">/joint_states</text>

  <line x1="365" y1="165" x2="365" y2="84" stroke="#5bc07a" stroke-width="2.5" marker-end="url(#rc-out)"/>
  <line x1="655" y1="165" x2="655" y2="84" stroke="#5bc07a" stroke-width="2.5" marker-end="url(#rc-out)"/>

  <!-- cadre controller_manager / ros2_control -->
  <rect x="200" y="120" width="600" height="160" rx="12" fill="#1b2129" stroke="#40a8c4" stroke-width="2"/>
  <text x="216" y="142" fill="#40a8c4" font-size="13" text-anchor="start">ros2_control · controller_manager</text>

  <!-- contrôleur omni (mis en avant) -->
  <rect x="224" y="160" width="276" height="100" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="362" y="196" fill="#ff7a1a" font-size="13" text-anchor="middle">omni_wheel_</text>
  <text x="362" y="214" fill="#ff7a1a" font-size="13" text-anchor="middle">drive_controller</text>
  <text x="362" y="238" fill="#9ba7b4" font-size="10.5" text-anchor="middle">cinématique inverse → /odom</text>

  <!-- joint_state_broadcaster -->
  <rect x="540" y="160" width="236" height="100" rx="8" fill="#2a323d" stroke="#323b48" stroke-width="2"/>
  <text x="658" y="196" fill="#e6edf3" font-size="13" text-anchor="middle">joint_state_</text>
  <text x="658" y="214" fill="#e6edf3" font-size="13" text-anchor="middle">broadcaster</text>
  <text x="658" y="238" fill="#9ba7b4" font-size="10.5" text-anchor="middle">diffuse l'état des joints</text>

  <!-- command_interfaces (descend) / state_interfaces (remonte) -->
  <line x1="340" y1="282" x2="340" y2="348" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#rc-cmd)"/>
  <text x="332" y="312" fill="#ff7a1a" font-size="11" text-anchor="end">command_interfaces</text>
  <text x="332" y="328" fill="#9ba7b4" font-size="10" text-anchor="end">consignes (écriture) ↓</text>

  <line x1="640" y1="348" x2="640" y2="282" stroke="#40a8c4" stroke-width="2.5" marker-end="url(#rc-state)"/>
  <text x="648" y="312" fill="#40a8c4" font-size="11" text-anchor="start">state_interfaces</text>
  <text x="648" y="328" fill="#9ba7b4" font-size="10" text-anchor="start">↑ état (lecture)</text>

  <!-- hardware interface -->
  <rect x="200" y="350" width="600" height="84" rx="10" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="500" y="382" fill="#e6edf3" font-size="15" text-anchor="middle">Hardware Interface</text>
  <text x="500" y="406" fill="#9ba7b4" font-size="12" text-anchor="middle">gz_ros2_control (sim) · driver moteurs (réel)</text>

  <!-- hardware <-> robot -->
  <line x1="500" y1="434" x2="500" y2="470" stroke="#9ba7b4" stroke-width="2.5" marker-start="url(#rc-hw)" marker-end="url(#rc-hw)"/>
  <text x="512" y="456" fill="#9ba7b4" font-size="10.5" text-anchor="start">applique / lit</text>

  <!-- robot -->
  <rect x="200" y="470" width="600" height="72" rx="10" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="500" y="502" fill="#e6edf3" font-size="15" text-anchor="middle">Robot</text>
  <text x="500" y="524" fill="#9ba7b4" font-size="12" text-anchor="middle">Gazebo (sim) · 3 roues réelles</text>

  <!-- légende -->
  <text x="500" y="572" fill="#9ba7b4" font-size="11" text-anchor="middle">command_interfaces = écriture des consignes (vers le matériel)</text>
  <text x="500" y="588" fill="#9ba7b4" font-size="11" text-anchor="middle">state_interfaces = lecture de l'état — la boucle écrire / lire</text>
</svg>
