<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 470" width="700" height="470" role="img" aria-labelledby="ma-title ma-desc" font-family="'JetBrains Mono', ui-monospace, monospace">
  <title id="ma-title">Architecture MoveIt 2 autour du nœud move_group</title>
  <desc id="ma-desc">Le panneau MotionPlanning de RViz envoie des requêtes au nœud central move_group, qui s'appuie sur les planners OMPL / STOMP et un plugin de cinématique inverse (KDL / TracIK). move_group commande ensuite l'action /arm_controller/follow_joint_trajectory (et /gripper_controller/gripper_cmd pour la pince), qui pilote le robot en simulation ou réel.</desc>

  <defs>
    <marker id="ma-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff7a1a"/>
    </marker>
  </defs>

  <!-- RViz MotionPlanning panel -->
  <rect x="110" y="22" width="220" height="52" rx="8" fill="#212833" stroke="#40a8c4" stroke-width="2"/>
  <text x="220" y="45" fill="#e6edf3" font-size="14" text-anchor="middle">RViz</text>
  <text x="220" y="63" fill="#9ba7b4" font-size="12" text-anchor="middle">MotionPlanning panel</text>

  <!-- arrow down to move_group -->
  <line x1="220" y1="74" x2="220" y2="134" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#ma-arr)"/>

  <!-- move_group (nœud central, mis en avant) -->
  <rect x="118" y="138" width="204" height="60" rx="8" fill="#2a323d" stroke="#ff7a1a" stroke-width="2.5"/>
  <text x="220" y="164" fill="#ff7a1a" font-size="15" text-anchor="middle">move_group</text>
  <text x="220" y="183" fill="#9ba7b4" font-size="11" text-anchor="middle">nœud central</text>

  <!-- branche vers planners + IK -->
  <path d="M322 168 L 372 168 L 372 132" fill="none" stroke="#ff7a1a" stroke-width="2.5"/>
  <path d="M322 168 L 372 168 L 372 204" fill="none" stroke="#ff7a1a" stroke-width="2.5"/>
  <line x1="372" y1="132" x2="438" y2="132" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#ma-arr)"/>
  <line x1="372" y1="204" x2="438" y2="204" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#ma-arr)"/>

  <!-- OMPL / STOMP planners -->
  <rect x="442" y="109" width="236" height="46" rx="8" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="560" y="137" fill="#e6edf3" font-size="13" text-anchor="middle">OMPL / STOMP planners</text>

  <!-- IK plugin -->
  <rect x="442" y="181" width="236" height="46" rx="8" fill="#212833" stroke="#323b48" stroke-width="2"/>
  <text x="560" y="209" fill="#e6edf3" font-size="13" text-anchor="middle">IK plugin (KDL / TracIK)</text>

  <!-- arrow down to controller action -->
  <line x1="220" y1="198" x2="220" y2="278" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#ma-arr)"/>

  <!-- /arm_controller/follow_joint_trajectory -->
  <rect x="40" y="282" width="360" height="60" rx="8" fill="#212833" stroke="#ff7a1a" stroke-width="2"/>
  <text x="220" y="307" fill="#e6edf3" font-size="13" text-anchor="middle">/arm_controller/</text>
  <text x="220" y="326" fill="#e6edf3" font-size="13" text-anchor="middle">follow_joint_trajectory</text>

  <!-- annotation pince -->
  <text x="416" y="306" fill="#9ba7b4" font-size="11" text-anchor="start">pince :</text>
  <text x="416" y="322" fill="#9ba7b4" font-size="11" text-anchor="start">/gripper_controller/gripper_cmd</text>

  <!-- arrow down to robot -->
  <line x1="220" y1="342" x2="220" y2="392" stroke="#ff7a1a" stroke-width="2.5" marker-end="url(#ma-arr)"/>

  <!-- Robot -->
  <rect x="125" y="396" width="190" height="50" rx="8" fill="#212833" stroke="#5bc07a" stroke-width="2"/>
  <text x="220" y="426" fill="#e6edf3" font-size="14" text-anchor="middle">Robot (sim ou réel)</text>
</svg>
