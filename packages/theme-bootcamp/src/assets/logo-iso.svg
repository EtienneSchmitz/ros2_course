<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" role="img" aria-label="ROS 2 - Bootcamp">
  <title>ROS 2 - Bootcamp</title>
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- Base mobile (cube isométrique : Kiwi) -->
    <polygon points="10,40 28,32 46,40 28,48" fill="#1f6f8b" stroke="#40a8c4" stroke-width="1.5"/>
    <polygon points="10,40 10,46 28,54 28,48" fill="#152935" stroke="#40a8c4" stroke-width="1.5"/>
    <polygon points="46,40 46,46 28,54 28,48" fill="#1a4255" stroke="#40a8c4" stroke-width="1.5"/>
    <!-- Bras articulé SO-101 enraciné au centre du losange supérieur (28,40), pli en Λ -->
    <line x1="28" y1="40" x2="22" y2="22" stroke="#40a8c4" stroke-width="3"/>
    <line x1="22" y1="22" x2="40" y2="16" stroke="#40a8c4" stroke-width="3"/>
    <circle cx="28" cy="40" r="3" fill="#1f6f8b" stroke="#40a8c4" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="3" fill="#1f6f8b" stroke="#40a8c4" stroke-width="1.5"/>
    <circle cx="40" cy="16" r="3.5" fill="#ff7a1a" stroke="#ff7a1a" stroke-width="1.5"/>
  </g>
  <text x="68" y="36" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="20" font-weight="700" letter-spacing="0.06em" fill="#e6edf3">
    ROS 2 — BOOTCAMP
  </text>
</svg>
